[pytest]
# pytest配置文件

# 测试目录
testpaths = tests

# Python文件匹配模式
python_files = test_*.py

# 测试类匹配模式
python_classes = Test*

# 测试函数匹配模式
python_functions = test_*

# 添加选项
addopts =
    -v
    --tb=short
    --strict-markers

# 标记
markers =
    slow: 慢速测试
    api: API测试
    db: 数据库测试

# 日志
log_cli = false
